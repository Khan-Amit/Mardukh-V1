<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARDUKH SYSTEM // SA-AKHRAN-V1-</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; font-family: monospace; background-color: #111; color: #fff; overflow-x: hidden; }
        
        /* Full screen background layout using your Page 1 PNG */
        .viewport-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background: url('app/src/main/res/drawable/landing_layout.png') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Glassmorphic Top Info Bar */
        .terminal-header {
            background: rgba(0, 0, 0, 0.8);
            padding: 24px;
            border-bottom: 2px solid #FFD700;
        }
        .title { color: #FFD700; font-size: 24px; font-weight: bold; letter-spacing: 2px; }
        .subtitle { color: #aaa; font-size: 13px; margin-top: 5px; }

        /* Bottom Floating CTA Button Box */
        .action-tray {
            padding: 32px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0));
            text-align: center;
        }
        .download-btn {
            display: inline-block;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            background-color: #FFD700;
            color: #111;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
            transition: transform 0.2s;
        }
        .download-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="viewport-container">
        <!-- System Data Overlay -->
        <header class="terminal-header">
            <div class="title">MARDUKH SYSTEM</div>
            <div class="subtitle">Core Implementation Deployment: SA-AKHRAN-V1-</div>
        </header>

        <!-- Direct Standalone Installation Trigger -->
        <div class="action-tray">
            <a href="https://github.com" class="download-btn">
                DOWNLOAD STANDALONE APP (.APK)
            </a>
        </div>
    </div>

</body>
</html>
